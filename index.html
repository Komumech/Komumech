<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Komumech</title>
    <link rel="stylesheet" href="/styles/navbar.css">
    <link rel="stylesheet" href="/styles/hero.css">
    <link rel="stylesheet" href="/styles/sect2.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
:root {
    /* Main Brand Colors from Logo */
    --primary-color: #E94264;      /* High-end Pink/Red from the left of the 'K' */
    --secondary-color: #3BBCC0;    /* Sophisticated Cyan from the top-right of the 'K' */
    
    /* Neutral Foundation */
    --background-color: #FFFFFF;   /* Pure white for that clean 'Google' feel */
    --text-main: #202124;          /* Google's signature off-black for readability */
    --text-sub: #5F6368;           /* Standard grey for secondary info */
    
    /* UI Elements */
    --hover-background: #F8F9FA;   /* Very subtle grey for hover states */
    --border-color: #DADCE0;      /* Light border for cards and inputs */
    
    /* Buttons */
    --button-bg: var(--primary-color);
    --button-text: #FFFFFF;
    --sub-font: 1.2rem;
}
        body {
            min-height: 130vh;
            margin: 0;
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: #ffffff;
            font-weight: 400;
        }

        .navbar {
            background-color: var(--background-color);
            padding: 18px 34px; /* Luxury spacing: Room to breathe */
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 1000;
            transition: transform 0.3s ease;
        }
        .logo {
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 12px;
            font-size: 22px;
            font-weight: 600;
            color: var(--text-main);
            letter-spacing: -0.02em;
        }
        .logo svg {
            fill: var(--secondary-color); /* Two-Color Rule: Secondary for icons */
        }
        .nav-menu {
            display: flex;
            gap: 40px; /* Generous spacing between links */
            align-items: center;
        }
        .nav-item {
            text-decoration: none;
            color: var(--text-sub);
            font-weight: 500;
            font-size: 15px;
            transition: color 0.2s ease;
        }
        .nav-item:hover {
            color: var(--text-main);
        }
        .nav-btn {
            background-color: var(--primary-color);
            color: var(--button-text);
            padding: 15px 28px;
            border-radius: 32px;
            transition: box-shadow 0.3s ease, transform 0.2s ease;
        }
        .nav-btn:hover {
            /* Subtle Interactivity: Shadow lift instead of color change */
            box-shadow: 0 8px 20px rgba(233, 66, 100, 0.25);
            transform: translateY(-1px);
            color: var(--button-text);
        }
        .hamburger {
            display: none;
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
        }
        .hamburger svg {
            fill: var(--text-main);
        }
        @media (max-width: 768px) {
            .navbar {
                padding: 16px 24px;
            }
            .hamburger {
                display: block;
            }
            .nav-menu {
                display: none;
                position: absolute;
                top: 100%; left: 0; right: 0;
                background: var(--background-color);
                flex-direction: column;
                padding: 24px;
                box-shadow: 0 10px 40px rgba(0,0,0,0.1);
            }
            .nav-menu.active { display: flex; }
            .nav-btn { width: 100%; text-align: center; box-sizing: border-box; }
        }
        .nav-hidden {
            transform: translateY(-100%);
        }
        .centre-text {
            text-align: center;
            font-size: 7rem;
            font-weight: 700;
            margin-top: 80px;
            transition: opacity 0.5s ease-in-out;
            opacity: 1;
        }
        .centre-text.fade-out {
            opacity: 0;
        }
        /* Animation Classes */
        .bounce-o {
            display: inline-block;
            color: #ff6b00; /* Basketball Orange */
            animation: bounce 0.6s infinite alternate cubic-bezier(0.5, 0.05, 1, 0.5);
        }
        @keyframes bounce {
            from { transform: translateY(0); }
            to { transform: translateY(-20px); }
        }

        .creative-anim {
            background: linear-gradient(90deg, var(--primary-color), var(--secondary-color), var(--primary-color));
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientFlow 7s linear infinite;
        }
        .creative-anim-special{
            background: linear-gradient(90deg, black, grey, white, rgb(65, 64, 64));
            background-size: 200% auto;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradientFlow 7s linear infinite;
        }
        @keyframes gradientFlow {
            to { background-position: 200% center; }
        }

        .stunning-anim {
            display: inline-block;
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn {
            from { transform: scale(0.5); opacity: 0; }
            to { transform: scale(1); opacity: 1; }
        }
                .active{
    color: var(--primary-color);
    border-bottom: 2px solid var(--primary-color);
}
    </style>
</head>
<body>
    <nav class="navbar">
        <a href="#" class="logo">
            <span style="font-size: 1.4rem;">Komumech</span>
        </a>
        <button class="hamburger" aria-label="Menu">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="#5f6368"><path d="M3 18h18v-2H3v2zm0-5h18v-2H3v2zm0-7v2h18V6H3z"/></svg>
        </button>
        <div class="nav-menu">
            <a href="#" class="nav-item active">Product</a>
            <a href="#" class="nav-item">Solutions</a>
            <a href="#" class="nav-item">Pricing</a>
            <a href="#" class="nav-item nav-btn">Get Started</a>
        </div>
    </nav>
<div class="hero">
    <div class="header">
        How Google AI is helping U.S. Olympians find their edge
        <br>
        <span class="head-txt">In partnership with Google DeepMind, Google Cloud has built an industry-first, AI-powered video analysis platform for athletes.
</span>

<div class="line"></div>
    </div>
</div>

<div class="sect2">
    <div class="vid">

    </div>
</div>

    <script>
        document.querySelector('.hamburger').addEventListener('click', function() {
            document.querySelector('.nav-menu').classList.toggle('active');
        });

        let lastScrollTop = 0;
        const navbar = document.querySelector('.navbar');
        window.addEventListener('scroll', function() {
            let scrollTop = window.pageYOffset || document.documentElement.scrollTop;
            if (scrollTop > lastScrollTop && scrollTop > 50) {
                navbar.classList.add('nav-hidden');
            } else {
                navbar.classList.remove('nav-hidden');
            }
            lastScrollTop = scrollTop <= 0 ? 0 : scrollTop;
        });

        const heroTexts = [
            '<span class="creative-anim">Innovation</span>', 
            '<span class="creative-anim">Creativity</span>', 
            '<span class="creative-anim-special">Komumech</span>'
        ];
        let textIndex = 0;
        const textElement = document.querySelector('.centre-text');

        setInterval(() => {
            textElement.classList.add('fade-out');
            setTimeout(() => {
                textIndex = (textIndex + 1) % heroTexts.length;
                textElement.innerHTML = heroTexts[textIndex];
                textElement.classList.remove('fade-out');
            }, 500);
        }, 7000);
    </script>
</body>
</html>
